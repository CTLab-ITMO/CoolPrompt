# RIDER Experiment Configuration Template
# Full configuration for production experiments

# Experiment metadata
experiment_name: "rider_full_experiment"
description: "Complete RIDER experiment across all 5 datasets"
seed: 42

# Datasets to evaluate
datasets:
  - name: "GSM8K"
    train_size: 100
    val_size: 100
    dev_size: 50
    test_size: 500

  - name: "AG_News"
    train_size: 100
    val_size: 100
    dev_size: 50
    test_size: 500

  - name: "SQuAD_2"
    train_size: 100
    val_size: 100
    dev_size: 50
    test_size: 500

  - name: "CommonGen"
    train_size: 100
    val_size: 100
    dev_size: 50
    test_size: 500

  - name: "XSum"
    train_size: 100
    val_size: 100
    dev_size: 50
    test_size: 500

# Methods to compare
methods:
  - "RIDER"
  - "EvoPrompt-GA"
  - "EvoPrompt-DE"
  - "APE"
  - "ZeroShot"

# LLM Configuration
llm:
  provider: "openai"  # openai, openrouter, deepseek, gemini
  model: "gpt-3.5-turbo"
  temperature: 0.7
  max_tokens: 2048
  timeout: 30
  max_retries: 3

# RIDER Configuration
rider:
  # Population
  population_size: 15
  num_generations: 12
  elite_size: 3
  tournament_size: 3

  # Diversity
  diversity_threshold: 0.85

  # UCB (Multi-Armed Bandit)
  ucb_c: 1.414  # √2, exploration constant

  # Adaptive Hyperparameters
  temperature_min: 0.3
  temperature_max: 1.2

  # Long-term Memory
  max_memory_patterns: 20
  memory_update_interval: 3  # Update every N generations

  # Selection Strategy
  use_pareto_selection: false  # true for Pareto, false for greedy+diversity
  ensemble_size: 5  # k-DPP ensemble size

# Evaluation Configuration
evaluation:
  use_cache: true
  max_cache_size: 10000
  show_progress: true
  save_predictions: true

# Output Configuration
output_dir: "./results"
save_history: true  # Save detailed evolution history (CRITICAL for analysis)
save_checkpoints: false  # Save intermediate checkpoints
